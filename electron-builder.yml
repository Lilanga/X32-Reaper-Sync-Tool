appId: com.tritonelabs.x32reapersync
productName: TriTone X32 Sync
copyright: Copyright © 2026 Tritone Labs

directories:
  buildResources: build
  output: dist

files:
  - out/**
  - package.json

extraResources:
  - from: resources
    to: resources
    filter:
      - '**/*'

asar: true

win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

mac:
  icon: build/icon.png
  target:
    - dmg
    - zip
  category: public.app-category.music
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

linux:
  icon: build/icon.png
  target:
    - AppImage
  category: AudioVideo
