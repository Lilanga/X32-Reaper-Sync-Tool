name: Build installers

# Builds the Windows installer and the macOS app/dmg on their native runners,
# so a Mac build is available without owning a Mac. Run manually from the
# Actions tab, or push a v* tag to also attach the installers to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            package: package:win
          - os: macos-latest
            package: package:mac
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build installer
        run: npm run ${{ matrix.package }}
        env:
          # Currently unsigned. To sign + notarize, add the secrets and delete
          # this line:
          #   Windows → CSC_LINK, CSC_KEY_PASSWORD
          #   macOS   → CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
          #             APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore

      - name: Attach installers to the release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          fail_on_unmatched_files: false
